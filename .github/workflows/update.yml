name: update

# Poll for a new oh-my-pi release and commit the bump straight to main.
# There is no PR gate, so a build check verifies every platform binary fetches
# and hash-verifies (fixed-output derivations build on any runner) and the
# home-manager module still evaluates before the commit is pushed.
#
# Triggers: hourly cron, manual dispatch, and repository_dispatch (type
# "omp-release") so an external watcher can fire an update the moment upstream
# publishes — send it with:
#   gh api repos/jamtur01/nix-omp/dispatches -f event_type=omp-release

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [omp-release]

permissions:
  contents: write

concurrency:
  group: omp-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Refresh VERSION.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash ./update.sh

      - name: Detect change
        id: diff
        run: |
          if git diff --quiet -- VERSION.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already at the latest release; nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$(jq -r .version VERSION.json)" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify recorded hashes match served binaries
        if: steps.diff.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.diff.outputs.version }}
        run: |
          base="https://github.com/can1357/oh-my-pi/releases/download/v${VERSION}"
          declare -A assets=(
            [x86_64-linux]=omp-linux-x64   [aarch64-linux]=omp-linux-arm64
            [x86_64-darwin]=omp-darwin-x64 [aarch64-darwin]=omp-darwin-arm64
          )
          for sys in "${!assets[@]}"; do
            want="$(jq -r --arg s "$sys" '.hashes[$s]' VERSION.json)"
            got="$(nix store prefetch-file --json "$base/${assets[$sys]}" | jq -r .hash)"
            if [[ "$want" != "$got" ]]; then
              echo "::error::$sys hash mismatch: VERSION.json=$want served=$got"
              exit 1
            fi
            echo "$sys ok ($got)"
          done

      - name: Build native package and module check
        if: steps.diff.outputs.changed == 'true'
        run: |
          nix build --no-link --print-build-logs \
            .#packages.x86_64-linux.omp \
            .#checks.x86_64-linux.hm-module

      - name: Commit to main
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION.json
          git commit -m "chore: update omp to ${{ steps.diff.outputs.version }}"
          git push
